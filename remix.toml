# remix.toml — example kernel remix descriptor
# Run: lkf remix --dry-run

[remix]
name        = "example-desktop"
version     = "6.12"
flavor      = "mainline"
arch        = "x86_64"
description = "Example desktop kernel built with GCC"

[build]
llvm         = false
lto          = "none"
threads      = 0           # 0 = nproc
config       = "defconfig"
target       = "desktop"
output       = "deb"
localversion = "-lkf"

[patches]
sets  = []
files = []

[cross]
prefix = ""

# [tkg] section is only used when [remix] flavor = "tkg"
# Run: lkf patch fetch --version 6.12 --set tkg  (before building)
[tkg]
cpusched = "eevdf"   # bore | eevdf | cfs | bmq | pds
ntsync   = false     # NTsync (Wine/Proton performance)
fsync    = true      # Fsync legacy via futex_waitv
clear    = true      # Clear Linux performance patches
acs      = false     # ACS IOMMU override (GPU passthrough)
openrgb  = false     # OpenRGB kernel support
o3       = false     # O3 + per-CPU-arch optimizations
zenify   = true      # TkG base tweaks (glitched-base)

[output]
build_dir    = "build"
download_dir = "downloads"
clean_after  = false
remove_after = false
