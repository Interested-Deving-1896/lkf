name: Upstream Direct Commits from OSP + OOC

on:
  schedule:
    - cron: "47 * * * *"
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Repo name substring filter (blank = all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — detect commits without opening PRs"
        type: boolean
        required: false
        default: false
      mirror_orgs:
        description: "Space-separated mirror orgs to scan (blank = both OSP and OOC)"
        required: false
        default: ""
      rate_limit_rerun:
        description: "Set by rate-limit-rerun workflow — prevents re-trigger loops"
        required: false
        default: "false"
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  upstream-commits:
    name: Upstream direct commits → Interested-Deving-1896
    if: inputs.rate_limit_rerun != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Upstream direct commits from OSP and OOC
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}  # Changed from SYNC_TOKEN to GH_TOKEN
          UPSTREAM_OWNER: Interested-Deving-1896
          MIRROR_ORGS: "OpenOS-Project-OSP OpenOS-Project-Ecosystem-OOC"
        run: bash scripts/upstream-commits.sh
