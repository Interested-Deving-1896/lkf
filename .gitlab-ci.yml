# Converted from GitHub Actions — lkf (Linux Kernel Framework)

stages:
  - test
  - release

default:
  image: ubuntu:22.04

# ── CI ────────────────────────────────────────────────────────────────────────
test:
  stage: test
  before_script:
    - apt-get update -qq && apt-get install -y shellcheck
  script:
    - |
      failed=0
      for f in $(find . -name "*.sh" ! -path "./.git/*"); do
        bash -n "$f" || { echo "FAIL syntax: $f"; failed=1; }
        shellcheck --severity=warning "$f" || { echo "FAIL shellcheck: $f"; failed=1; }
      done
      exit $failed
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── GitLab Release ────────────────────────────────────────────────────────────
gitlab-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: 'lkf $CI_COMMIT_TAG'
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
